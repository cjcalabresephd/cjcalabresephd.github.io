name: Update Publications

on:
  schedule:
    - cron: "0 0 * * 0"

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Fetch Scholar BibTeX
        run: |
          curl "https://scholar.googleusercontent.com/scholar.bib?q=info:bSngWScAAAAJ:scholar.google.com/&output=citation&hl=en" -o _bibliography/publications.bib

      - name: Commit updates
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add _bibliography/publications.bib
          git commit -m "Update publications"
          git push
